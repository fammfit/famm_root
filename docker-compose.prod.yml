version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: production
    container_name: famm-web
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    env_file: .env.production
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: production
    container_name: famm-api
    restart: always
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
    env_file: .env.production
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
