version: "3.9"

# Credentials are sourced from the host environment (or a .env file in this
# directory, which docker compose picks up automatically). Generate strong
# values locally with:
#   echo "POSTGRES_PASSWORD=$(openssl rand -hex 32)" >> .env

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: famm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-famm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-famm_dev}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-famm} -d ${POSTGRES_DB:-famm_dev}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.2-alpine
    container_name: famm-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  nats:
    image: nats:2.10-alpine
    container_name: famm-nats
    restart: unless-stopped
    command: ["-js", "-m", "8222", "--name", "famm-nats"]
    ports:
      - "127.0.0.1:4222:4222"
      - "127.0.0.1:8222:8222"
    healthcheck:
      test:
        ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: development
    container_name: famm-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://${POSTGRES_USER:-famm}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-famm_dev}
      - REDIS_URL=redis://redis:6379
    env_file: .env.local
    volumes:
      - ./apps/web:/app/apps/web
      - /app/apps/web/node_modules
      - /app/apps/web/.next
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: development
    container_name: famm-api
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=development
      - PORT=4000
      - DATABASE_URL=postgresql://${POSTGRES_USER:-famm}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-famm_dev}
      - REDIS_URL=redis://redis:6379
      - NATS_URL=nats://nats:4222
    env_file: .env.local
    volumes:
      - ./apps/api:/app/apps/api
      - /app/apps/api/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:

networks:
  default:
    name: famm-network
